
<div id="erd" style="padding: 1rem 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#1a2535' : '#e6f1fb',
    primaryBorderColor: dark ? '#185fa5' : '#185fa5',
    primaryTextColor: dark ? '#c2c0b6' : '#0c447c',
    secondaryColor: dark ? '#1a2e28' : '#e1f5ee',
    tertiaryColor: dark ? '#2b2518' : '#faeeda',
  },
});

const diagram = `erDiagram
  USER {
    uuid id PK
    string username UK
    string email UK
    string password_hash
    enum role "CUSTOMER | TURF_OWNER | ADMIN"
    string phone
    boolean is_active
    timestamp created_at
    timestamp updated_at
  }

  TURF {
    uuid id PK
    uuid owner_id FK
    string name
    text description
    text address
    string city
    string state
    decimal latitude
    decimal longitude
    enum status "PENDING | ACTIVE | REJECTED | SUSPENDED"
    timestamp created_at
    timestamp updated_at
  }

  TURF_SPORT {
    uuid id PK
    uuid turf_id FK
    string sport_type
    decimal base_price
    decimal weekend_price
    decimal peak_price
    unique turf_id_sport_type UK
  }

  TURF_SCHEDULE {
    uuid id PK
    uuid turf_id FK
    enum day_of_week "MON..SUN"
    time open_time
    time close_time
    int slot_duration_mins
    unique turf_id_day UK
  }

  ONBOARDING_REQUEST {
    uuid id PK
    uuid owner_id FK
    uuid turf_id FK
    uuid reviewer_id FK
    enum status "PENDING | APPROVED | REJECTED | EXPIRED"
    text rejection_reason
    timestamp submitted_at
    timestamp reviewed_at
    timestamp expires_at
  }

  BOOKING {
    uuid id PK
    uuid customer_id FK
    uuid turf_id FK
    uuid turf_sport_id FK
    date booking_date
    time start_time
    time end_time
    decimal total_amount
    enum status "PENDING | CONFIRMED | CANCELLED | COMPLETED | EXPIRED"
    timestamp created_at
    timestamp updated_at
  }

  PAYMENT {
    uuid id PK
    uuid booking_id FK
    enum payment_method "CREDIT_CARD | WALLET | UPI"
    decimal amount
    enum status "INITIATED | SUCCESS | FAILED | REFUNDED | PENDING"
    string transaction_ref
    timestamp paid_at
    timestamp created_at
  }

  NOTIFICATION {
    uuid id PK
    uuid user_id FK
    string type
    enum channel "EMAIL | SMS"
    string subject
    text message
    boolean is_sent
    timestamp sent_at
    timestamp created_at
  }

  USER ||--o{ TURF : "owns (as TURF_OWNER)"
  USER ||--o{ BOOKING : "makes (as CUSTOMER)"
  USER ||--o{ NOTIFICATION : "receives"
  USER ||--o{ ONBOARDING_REQUEST : "submits"
  USER ||--o{ ONBOARDING_REQUEST : "reviews (as ADMIN)"
  TURF ||--o{ TURF_SPORT : "offers"
  TURF ||--o{ TURF_SCHEDULE : "has schedule"
  TURF ||--o{ ONBOARDING_REQUEST : "associated with"
  TURF ||--o{ BOOKING : "booked at"
  TURF_SPORT ||--o{ BOOKING : "booked as"
  BOOKING ||--|| PAYMENT : "paid via"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
